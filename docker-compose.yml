services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: canteen_db
      POSTGRES_USER: canteen_user
      POSTGRES_PASSWORD: canteen_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U canteen_user -d canteen_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://canteen_user:canteen_pass@db:5432/canteen_db
      SECRET_KEY: change-this-in-production
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
